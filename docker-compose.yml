services:
  postgres:
    image: postgres:16-alpine
    container_name: promo-list-bg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: promo_list_bg
      POSTGRES_USER: promo
      POSTGRES_PASSWORD: promo
    ports:
      - "5432:5432"
    volumes:
      - promo_list_bg_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promo -d promo_list_bg"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  promo_list_bg_pgdata:
